<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/RenovatPneus/frontend/dist"

    <Directory "C:/RenovatPneus/frontend/dist">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Proxy para o backend Laravel na porta 8000
    ProxyPreserveHost On
    ProxyPass        /api      http://localhost:8000/api
    ProxyPassReverse /api      http://localhost:8000/api
    ProxyPass        /sanctum  http://localhost:8000/sanctum
    ProxyPassReverse /sanctum  http://localhost:8000/sanctum

    ErrorLog  "C:/RenovatPneus/logs/apache-error.log"
    CustomLog "C:/RenovatPneus/logs/apache-access.log" combined
</VirtualHost>
