; PHP.ini — RenovatPneus (gerado pelo instalador)
[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
zlib.output_compression = Off
implicit_flush = Off
serialize_precision = -1
zend.enable_gc = On
expose_php = Off
max_execution_time = 60
max_input_time = 60
memory_limit = 256M
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
post_max_size = 32M
upload_max_filesize = 16M
default_charset = "UTF-8"

; Extensoes necessarias para Laravel 11 + SQLite
; bcmath, json, xml, tokenizer, ctype sao built-in no PHP 8.2 (sem extension= necessario)
extension_dir = "ext"
extension=pdo_sqlite
extension=sqlite3
extension=openssl
extension=mbstring
extension=fileinfo

[Date]
date.timezone = America/Sao_Paulo

[Session]
session.save_handler = files
session.use_strict_mode = 0
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
